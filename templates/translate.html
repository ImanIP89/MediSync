<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مترجم پزشکی | MediSync</title>
    <style>
        body { background: #1e1e1e; color: #e0e0e0; font-family: Tahoma; margin: 0; }
        .navbar { background:#121212; padding:15px 30px; display:flex; justify-content:space-between; border-bottom:1px solid #444; }
        .navbar a { color:#ccc; text-decoration:none; margin-left:20px; }
        .navbar a:hover { color:#4cff8d; }
        .container { max-width:800px; margin:40px auto; padding:20px; }
        h1 { color:#4cff8d; }
        textarea { width:100%; height:120px; background:#121212; color:#0f0; border:1px solid #444; padding:10px; resize:vertical; }
        select { background:#121212; color:#0f0; border:1px solid #444; padding:8px; margin:10px 0; }
        button { background:#4cff8d; color:#000; padding:10px 30px; border:none; cursor:pointer; }
        #result { margin-top:20px; background:#121212; padding:15px; border-left:3px solid #4cff8d; white-space:pre-wrap; }
    </style>
</head>
<body>
    <nav class="navbar">
        <span style="color:#4cff8d; font-weight:bold;">🩺 MediSync</span>
        <div>
            <a href="/">🏠 خانه</a>
            <a href="/terminal">💻 ترمینال</a>
            <a href="/patient">👤 بیمار</a>
            <a href="/translate" style="color:#4cff8d;">🌐 ترجمه</a>
            <a href="/bulk">📥 افزودن گروهی</a>
        </div>
    </nav>
    <div class="container">
        <h1>🌐 مترجم پزشکی</h1>
        <textarea id="sourceText" placeholder="متن فارسی را وارد کنید..."></textarea>
        <div>
            <label>زبان مقصد:</label>
            <select id="targetLang">
                <option value="English">English</option>
                <option value="Korean">한국어 (Korean)</option>
                <option value="French">Français</option>
                <option value="Arabic">العربية</option>
                <option value="Spanish">Español</option>
            </select>
        </div>
        <button onclick="translateNow()">🔄 ترجمه کن</button>
        <div id="result"></div>
    </div>
    <script>
        async function translateNow() {
            const text = document.getElementById('sourceText').value.trim();
            const target = document.getElementById('targetLang').value;
            if (!text) return;
            const res = await fetch('/api/translate', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({text, target})
            });
            const data = await res.json();
            document.getElementById('result').textContent = data.translation || data.error;
        }
    </script>
</body>
</html>
