<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediSync Terminal - CMD زنده</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0c0c0c;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            padding: 20px;
            direction: ltr;
        }
        .terminal {
            width: 100%;
            max-width: 900px;
            background: #1e1e1e;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.15);
            overflow: hidden;
        }
        .terminal-header {
            background: #333;
            padding: 10px 15px;
            display: flex;
            gap: 8px;
            border-bottom: 1px solid #444;
        }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: #ff5f56; }
        .dot:nth-child(2) { background: #ffbd2e; }
        .dot:nth-child(3) { background: #27c93f; }
        .terminal-title { color: #ccc; margin-left: 15px; font-size: 14px; line-height: 12px; }
        .terminal-body {
            padding: 15px;
            height: 450px;
            overflow-y: auto;
            background: #121212;
            font-size: 15px;
            line-height: 1.7;
            color: #0f0;
            white-space: pre-wrap;
        }
        .log-entry { margin-bottom: 8px; unicode-bidi: embed; }
        .persian-text { direction: rtl; display: inline-block; text-align: right; }
        .terminal-input-line {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            background: #1a1a1a;
            border-top: 1px solid #333;
        }
        .prompt { color: #0f0; font-weight: bold; margin-right: 8px; font-size: 15px; }
        .input-field {
            flex: 1;
            background: transparent;
            border: none;
            color: #0f0;
            font-family: 'Courier New', monospace;
            font-size: 15px;
            outline: none;
        }
        .input-field::placeholder { color: #555; }
        .terminal-body::-webkit-scrollbar { width: 8px; }
        .terminal-body::-webkit-scrollbar-track { background: #1a1a1a; }
        .terminal-body::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        #micTerminalBtn { background: none; border: none; cursor: pointer; font-size: 20px; color: #0f0; padding: 0 10px; }
    </style>
</head>
<body>
    <div class="terminal">
        <div class="terminal-header">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <span class="terminal-title">MediSync Terminal — CMD تعاملی</span>
        </div>

        <div class="terminal-body" id="logArea"></div>

        <div class="terminal-input-line">
            <span class="prompt">C:\MediSync&gt;</span>
            <input type="text" class="input-field" id="cmdInput" placeholder="دستور خود را تایپ کنید..." autofocus>
            <button id="micTerminalBtn" onclick="toggleTerminalMic()" title="گوش دادن">🎤</button>
        </div>
    </div>

    <script>
        const logArea = document.getElementById('logArea');
        const cmdInput = document.getElementById('cmdInput');
        const micTerminalBtn = document.getElementById('micTerminalBtn');

        function addLog(text, isPersian = false) {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            if (isPersian) {
                entry.innerHTML = `<span class="persian-text">${text}</span>`;
            } else {
                entry.textContent = text;
            }
            logArea.appendChild(entry);
            logArea.scrollTop = logArea.scrollHeight;
        }

        addLog('Microsoft Windows [Version 10.0.19045.3693]');
        addLog('(c) MediSync Healthcare Shell. All rights reserved.');
        addLog('');
        addLog('دستورات: check, diagnose, add, ask, translate, delete');
        addLog('برای شروع، check را تایپ کنید.');
        addLog('');

        async function executeCommand(cmd) {
            addLog(`C:\\MediSync> ${cmd}`);
            try {
                const response = await fetch('/api/command', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cmd: cmd })
                });

                const rawText = await response.text();
                let data;
                try {
                    data = JSON.parse(rawText);
                } catch (e) {
                    addLog(`❌ پاسخ JSON معتبر نیست: ${rawText}`);
                    addLog('');
                    return;
                }

                const lines = data.output.split('\n');
                lines.forEach(line => {
                    if (line.trim() !== '') {
                        const isPersian = /[\u0600-\u06FF]/.test(line.trim()[0]);
                        addLog(line, isPersian);
                    }
                });
            } catch (error) {
                addLog(`❌ خطای fetch: ${error.message}`);
            }
            addLog('');
            cmdInput.value = '';
        }

        cmdInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const command = cmdInput.value.trim();
                if (command !== '') {
                    executeCommand(command);
                }
            }
        });

        // ---------- میکروفن ترمینال ----------
        const SpeechRecognitionTerm = window.SpeechRecognition || window.webkitSpeechRecognition;
        let termRecognition;
        let termRecording = false;

        if (SpeechRecognitionTerm) {
            termRecognition = new SpeechRecognitionTerm();
            termRecognition.lang = 'fa-IR';
            termRecognition.interimResults = false;
            termRecognition.continuous = false;

            termRecognition.onresult = (event) => {
                const voiceText = event.results[0][0].transcript.trim();
                if (voiceText) {
                    cmdInput.value = 'diagnose ' + voiceText;
                    addLog('🎤 گفتار تشخیص داده شد: ' + voiceText, true);
                    executeCommand('diagnose ' + voiceText);
                }
            };
            termRecognition.onerror = () => {
                addLog('❌ خطا در تشخیص صدا');
                termRecording = false;
                micTerminalBtn.style.color = '#0f0';
            };
            termRecognition.onend = () => {
                termRecording = false;
                micTerminalBtn.style.color = '#0f0';
            };
        } else {
            micTerminalBtn.style.display = 'none';
        }

        function toggleTerminalMic() {
            if (!termRecognition) return;
            if (termRecording) {
                termRecognition.stop();
                termRecording = false;
                micTerminalBtn.style.color = '#0f0';
            } else {
                termRecognition.start();
                termRecording = true;
                micTerminalBtn.style.color = '#ff4c4c';
                addLog('🎙️ ترمینال گوش می‌دهد... علائم را بگویید.');
            }
        }

        cmdInput.focus();
    </script>
</body>
</html>
